name: DevSecOps AI Agent CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  security-events: write

jobs:
  security-ci:
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install bandit pytest

      - name: Python Syntax Check
        run: |
          python -m compileall .

      - name: Bandit Python Security Scan
        run: |
          bandit -r . -f json -o bandit-report.json || true

      - name: Checkov IaC Security Scan
        run: |
          checkov -d . --quiet --output json --output-file-path checkov-report.json || true

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy Filesystem Scan
        run: |
          trivy fs . --format json --output trivy-report.json || true

      - name: Test Streamlit App Import
        run: |
          python -c "import app; print('App import successful')"

      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-security-reports
          path: |
            bandit-report.json
            checkov-report.json
            trivy-report.json